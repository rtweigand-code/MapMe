<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- mobile viewport -->
  <meta
    name="viewport"
    content="initial-scale=1, maximum-scale=1, user-scalable=no"
  />

  <title>MapMe | Madison Community Reporting</title>

  <!-- ArcGIS CSS -->
  <link
    rel="stylesheet"
    href="https://js.arcgis.com/4.26/esri/themes/light/main.css"
  >

  <!-- custom css -->
  <link rel="stylesheet" href="css/style.css">

  <!-- ArcGIS JS -->
  <script src="https://js.arcgis.com/4.26/"></script>
</head>

<body>

  <!-- top nav -->
  <header class="topbar">

    <div class="brand">

      <div class="seal">M</div>

      <div>
        <h1>MapMe</h1>
        <p>Madison Community Reporting</p>
      </div>

    </div>

    <div class="top-actions">

      <button id="dashboardBtn">
        Dispatcher
      </button>

      <button id="menuBtn">
        ☰
      </button>

    </div>

  </header>

  <!-- menu drawer -->
  <aside id="menuPanel" class="menu-panel hidden">

    <div class="menu-header">

      <h2>MapMe</h2>

      <button id="closeMenuBtn">
        ×
      </button>

    </div>

    <div class="menu-links">

      <button class="menu-link">
        About
      </button>

      <button class="menu-link">
        Data & Sources
      </button>

      <button class="menu-link">
        Madison Resources
      </button>

      <button class="menu-link">
        Report Guidelines
      </button>

    </div>

  </aside>

  <!-- map -->
  <main class="map-layout">

    <!-- search bar -->
    <div id="searchContainer" class="search-container"></div>

    <!-- map -->
    <div id="viewDiv"></div>

    <!-- legend -->
    <div class="legend">

      <span>
        <i class="dot open"></i>
        Open
      </span>

      <span>
        <i class="dot review"></i>
        Under Review
      </span>

      <span>
        <i class="dot scheduled"></i>
        Scheduled
      </span>

      <span>
        <i class="dot resolved"></i>
        Resolved
      </span>

    </div>

    <!-- report button -->
    <button id="openReportBtn" class="report-fab">
      + Report an Issue
    </button>

  </main>

  <!-- report drawer -->
  <aside id="reportDrawer" class="report-drawer">

    <div class="drawer-header">

      <h2>Submit a Report</h2>

      <button id="closeDrawerBtn">
        ×
      </button>

    </div>

    <!-- report form -->
    <div class="drawer-content">

      <label for="category">
        Category
      </label>

      <select id="category">

        <option value="">
          -- Select Category --
        </option>

        <option value="abandoned_property">
          Abandoned Property
        </option>

        <option value="environmental_concerns">
          Environmental Concerns
        </option>

        <option value="general_service_request">
          General Service Request
        </option>

        <option value="graffiti_and_vandalism">
          Graffiti and Vandalism
        </option>

        <option value="parks_and_public_spaces">
          Parks and Public Spaces
        </option>

        <option value="roadway_maintenance">
          Roadway Maintenance
        </option>

        <option value="sidewalk_and_bikeway_maintenance">
          Sidewalk and Bikeway Maintenance
        </option>

        <option value="snow_and_ice_management">
          Snow and Ice Management
        </option>

        <option value="traffic_signals_and_lighting">
          Traffic Signals and Lighting
        </option>

        <option value="trees_and_vegetation">
          Trees and Vegetation
        </option>

        <option value="waste_and_illegal_dumping">
          Waste and Illegal Dumping
        </option>

        <option value="water_and_sewer_infrastructure">
          Water and Sewer Infrastructure
        </option>

      </select>

      <label for="description">
        Description
      </label>

      <textarea
        id="description"
        placeholder="Describe the issue..."
      ></textarea>

      <label for="address">
        Address or Nearby Location
      </label>

      <input
        id="address"
        type="text"
        placeholder="Example: near James Madison Park"
      >

      <label for="photoInput">
        Add Photo (Optional)
      </label>

      <input
        id="photoInput"
        type="file"
        accept="image/png, image/jpeg"
      >

      <!-- location controls -->
      <label>
        Location
      </label>

      <div class="location-buttons">

        <button id="clearLocationBtn">
          Clear Pin
        </button>

      </div>

      <!-- selected point -->
      <div class="location-box">

        <span id="selectedLocationText">
          Click the map to place a report pin
        </span>

      </div>

      <!-- info -->
      <div class="info-box">
        Reports are submitted anonymously and reviewed through the dispatcher workflow.
      </div>

      <!-- form buttons -->
      <div class="form-actions">

        <button id="submitBtn">
          Submit Report
        </button>

        <button id="clearFormBtn" class="cancel-btn">
          Clear
        </button>

      </div>

    </div>

  </aside>

  <!-- dispatcher dashboard -->
  <section id="dashboardPanel" class="dashboard hidden">

    <div class="dashboard-header">

      <h2>Dispatcher Dashboard</h2>

      <button id="closeDashboard">
        ×
      </button>

    </div>

    <!-- filters -->
    <div class="tabs">

      <button class="filter-tab active" data-status="all">
        All Reports
      </button>

      <button class="filter-tab" data-status="open">
        Open
      </button>

      <button class="filter-tab" data-status="under_review">
        Under Review
      </button>

      <button class="filter-tab" data-status="scheduled">
        Scheduled
      </button>

      <button class="filter-tab" data-status="resolved">
        Resolved
      </button>

    </div>

    <!-- cards -->
    <div id="reportList" class="report-list"></div>

  </section>

  <!-- js -->
  <script src="js/main.js"></script>

</body>
</html>
