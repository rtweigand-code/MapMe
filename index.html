<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />

  <title>MapMe | Madison Community Reporting</title>

  <!-- ArcGIS CSS -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.26/esri/themes/light/main.css">

  <!-- custom styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- ArcGIS JS API -->
  <script src="https://js.arcgis.com/4.26/"></script>
</head>

<body>

  <!-- top header -->
  <header class="topbar">

    <div class="brand">

      <div class="seal">M</div>

      <div>
        <h1>MapMe</h1>
        <p>Madison Community Reporting</p>
      </div>

    </div>

    <div class="top-actions">
      <button id="dashboardBtn">Dispatcher</button>
      <button id="menuBtn">☰</button>
    </div>

  </header>

  <!-- main app -->
  <main class="app-layout">

    <!-- map section -->
    <section class="map-section">

      <!-- search widget -->
      <div id="searchContainer" class="search-row"></div>

      <!-- ArcGIS map -->
      <div id="viewDiv"></div>

      <!-- legend -->
      <div class="legend">
        <span><i class="dot open"></i> Open</span>
        <span><i class="dot review"></i> Under Review</span>
        <span><i class="dot scheduled"></i> Scheduled</span>
        <span><i class="dot resolved"></i> Resolved</span>
      </div>

      <!-- mobile button -->
      <button id="mobileReportBtn" class="floating-report">
        + Report an Issue
      </button>

    </section>

    <!-- report form -->
    <aside class="report-panel" id="reportPanel">

      <h2>Submit a Report</h2>

      <label for="category">Category</label>

      <select id="category">

        <option value="">Select a category</option>

        <option value="abandoned_property">
          Abandoned Property
        </option>

        <option value="environmental_concerns">
          Environmental Concerns
        </option>

        <option value="general_service_request">
          General Service Request
        </option>

        <option value="graffiti_and_vandalism">
          Graffiti and Vandalism
        </option>

        <option value="parks_and_public_spaces">
          Parks and Public Spaces
        </option>

        <option value="roadway_maintenance">
          Roadway Maintenance
        </option>

        <option value="sidewalk_and_bikeway_maintenance">
          Sidewalk and Bikeway Maintenance
        </option>

        <option value="snow_and_ice_management">
          Snow and Ice Management
        </option>

        <option value="traffic_signals_and_lighting">
          Traffic Signals and Lighting
        </option>

        <option value="trees_and_vegetation">
          Trees and Vegetation
        </option>

        <option value="waste_and_illegal_dumping">
          Waste and Illegal Dumping
        </option>

        <option value="water_and_sewer_infrastructure">
          Water and Sewer Infrastructure
        </option>

      </select>

      <label for="description">Description</label>

      <textarea
        id="description"
        placeholder="Briefly describe the issue..."
      ></textarea>

      <label for="address">Address or Nearby Location</label>

      <input
        id="address"
        type="text"
        placeholder="Example: near James Madison Park"
      >

      <label for="photoInput">Photo Optional</label>

      <input
        id="photoInput"
        type="file"
        accept="image/png, image/jpeg"
      >

      <!-- location controls -->
      <label>Location</label>

      <div class="location-buttons">

        <button id="useMapBtn">
          Use Map
        </button>

        <button id="clearLocationBtn">
          Clear Pin
        </button>

      </div>

      <!-- selected point -->
      <div class="mini-map-box">

        <span id="selectedLocationText">
          Click the map to place a report pin
        </span>

      </div>

      <!-- info box -->
      <div class="info-box">
        Reports are submitted anonymously and reviewed through the dispatcher workflow.
      </div>

      <!-- form buttons -->
      <div class="form-actions">

        <button id="submitBtn">
          Submit Report
        </button>

        <button class="cancel" id="clearFormBtn">
          Clear
        </button>

      </div>

    </aside>

  </main>

  <!-- dispatcher panel -->
  <section id="dashboardPanel" class="dashboard hidden">

    <div class="dashboard-header">

      <h2>Dispatcher Dashboard</h2>

      <button id="closeDashboard">×</button>

    </div>

    <!-- filters -->
    <div class="tabs">

      <button class="filter-tab active" data-status="all">
        All Reports
      </button>

      <button class="filter-tab" data-status="open">
        Open
      </button>

      <button class="filter-tab" data-status="under_review">
        Under Review
      </button>

      <button class="filter-tab" data-status="scheduled">
        Scheduled
      </button>

      <button class="filter-tab" data-status="resolved">
        Resolved
      </button>

    </div>

    <!-- report cards -->
    <div id="reportList" class="report-list"></div>

  </section>

  <!-- main js -->
  <script src="js/main.js"></script>

</body>
</html>
